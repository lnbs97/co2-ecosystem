events {}

http {
  server {
    listen 80;

    # Regel 1: Der Hub (Startseite)
    # http://localhost:8080/
    location / {
      # Docker-DNS: "hub-ui" ist der Service-Name aus docker-compose
      proxy_pass http://hub-ui:80;
    }

    # Regel 2: Wallet-Frontend
    # http://localhost:8080/wallet
    location /wallet {
      proxy_pass http://wallet-ui:80;
    }

    # Regel 3: Shop-Frontend
    # http://localhost:8080/shop
    location /shop {
      proxy_pass http://shop-ui:80;
    }

    # Regel 4: Ledger-API (Spring Boot)
    # http://localhost:8080/api/ledger/...
    location /api/ledger/ {
      # Docker-DNS: "ledger-service" läuft intern auf 8080
      proxy_pass http://ledger-service:8080/api/ledger/;
    }

    # Regel 5: Shop-API
    # http://localhost:8080/api/shop/...
    location /api/shop/ {
      proxy_pass http://shop-service:5000/; # Annahme: Port 5000
    }

    # ... (Weitere Regeln für Börse, Jobbörse etc.) ...
  }
}