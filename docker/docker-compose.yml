version: "3.8" # Optional, aber gut für Übersicht

services:
  traefik:
    image: "traefik:v2.10"
    container_name: "traefik"
    command:
      - "--log.level=DEBUG"
      - "--api=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.dashboard.address=:8088"
    ports:
      - "8080:80"   # Der Haupteingang für alles
      - "8088:8088" # Traefik Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - co2-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/traefik`)" # Dashboard auf /traefik verschoben, damit / für den Hub frei ist
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=dashboard"


  # --- DASHBOARD SERVICE ---
  dashboard-backend:
    container_name: dashboard-backend
    build: ../services/dashboard/backend
    networks:
      - co2-network
    depends_on:
      - rabbitmq
    labels:
      - "traefik.enable=true"
      # The entrypoint for the backend API and WebSocket
      - "traefik.http.routers.dashboard-backend.rule=PathPrefix(`/api/dashboard`)"
      - "traefik.http.routers.dashboard-backend.entrypoints=web"

      # Middleware to strip the path so Node sees root "/"
      - "traefik.http.middlewares.dashboard-strip.stripprefix.prefixes=/api/dashboard"
      - "traefik.http.routers.dashboard-backend.middlewares=dashboard-strip"

      - "traefik.http.services.dashboard-backend.loadbalancer.server.port=8080"

  dashboard-ui:
    container_name: dashboard-ui
    build: ../services/dashboard/frontend
    networks:
      - co2-network
    labels:
      - "traefik.enable=true"
      # Frontend Endpoint
      - "traefik.http.routers.dashboard-ui.rule=PathPrefix(`/dashboard`)"
      - "traefik.http.routers.dashboard-ui.entrypoints=web"
      # Strip prefix so Nginx serves 'index.html' from root
      - "traefik.http.middlewares.dashboard-ui-strip.stripprefix.prefixes=/dashboard"
      - "traefik.http.routers.dashboard-ui.middlewares=dashboard-ui-strip"
      - "traefik.http.services.dashboard-ui.loadbalancer.server.port=80"

  # --- EXCHANGE SERVICE (/api/exchange-service) ---
  exchange-backend:
    container_name: exchange-backend
    build: ../services/exchange/backend 
    networks:
      - co2-network
    depends_on:
      - rabbitmq
    labels:
      - "traefik.enable=true"
      # Routet Anfragen an /api/exchange-service an diesen Container
      - "traefik.http.routers.exchange-backend.rule=PathPrefix(`/api/exchange-service`)"
      - "traefik.http.routers.exchange-backend.entrypoints=web"
      - "traefik.http.services.exchange-backend.loadbalancer.server.port=8080"
  
  exchange-ui:
    container_name: exchange-ui
    # Pfad zum Ordner mit dem Dockerfile (das wir gerade erstellt haben)
    build: ../services/exchange/frontend
    networks:
      - co2-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.exchange-ui.rule=PathPrefix(`/exchange`)"
      - "traefik.http.routers.exchange-ui.entrypoints=web"
      
      # 2. Middleware: StripPrefix definieren
      - "traefik.http.middlewares.exchange-strip.stripprefix.prefixes=/exchange"
      
      # 3. Middleware an den Router binden
      - "traefik.http.routers.exchange-ui.middlewares=exchange-strip"
      
      - "traefik.http.services.exchange-ui.loadbalancer.server.port=80"

  # --- HUB SERVICES (ROOT) ---

  hub-backend:
    container_name: hub-backend
    build: ../services/hub/backend
    networks:
      - co2-network
    depends_on:
      - rabbitmq
    labels:
      - "traefik.enable=true"
      # Flask App erwartet /api/user-service, also leiten wir das genau so weiter
      - "traefik.http.routers.hub-backend.rule=PathPrefix(`/api/user-service`) || PathPrefix(`/socket.io`)"
      - "traefik.http.routers.hub-backend.entrypoints=web"
      - "traefik.http.services.hub-backend.loadbalancer.server.port=8080"

      # WICHTIG für WebSockets: Sticky Sessions (damit der Client beim Handshake beim selben Container bleibt)
      # Auch wenn du nur 1 Container hast, ist das bei SocketIO oft sicherer.
      - "traefik.http.services.hub-backend.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.hub-backend.loadbalancer.sticky.cookie.name=sticky"

  hub-ui:
    container_name: hub-ui
    build: ../services/hub/frontend
    networks:
      - co2-network
    labels:
      - "traefik.enable=true"
      # Fängt alles ab, was auf / beginnt (Root App)
      # Wichtig: Spezifischere Regeln (wie /wallet oder /api) haben bei Traefik automatisch Vorrang.
      - "traefik.http.routers.hub-ui.rule=PathPrefix(`/`)"
      - "traefik.http.routers.hub-ui.entrypoints=web"
      - "traefik.http.services.hub-ui.loadbalancer.server.port=80"

  # --- WALLET SERVICES (/wallet) ---

  wallet-backend:
    container_name: wallet-backend
    build: ../services/wallet/backend
    networks:
      - co2-network
    depends_on:
      - rabbitmq
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wallet-backend.entrypoints=web"
      - "traefik.http.routers.wallet-backend.rule=PathPrefix(`/api/wallet`)"
      - "traefik.http.services.wallet-backend.loadbalancer.server.port=8080"

  wallet-ui:
    container_name: wallet-ui
    build: ../services/wallet/frontend
    networks:
      - co2-network
    labels:
      - "traefik.enable=true"
      # Frontend unter /wallet
      - "traefik.http.routers.wallet-ui.rule=PathPrefix(`/wallet`)"
      - "traefik.http.routers.wallet-ui.entrypoints=web"
      # WICHTIG: Kein StripPrefix! Next.js mit basePath='/wallet' erwartet den Pfad inklusive /wallet.
      - "traefik.http.services.wallet-ui.loadbalancer.server.port=3000"

  # --- SHOP SERVICES (/shop) ---

  shop-carbon-fashion-ui:
    container_name: shop-carbon-fashion-ui
    build: ../services/shop_carbon_fashion/frontend
    networks:
      - co2-network
    depends_on:
      - rabbitmq
      - wallet-backend
    environment:
      - PORT=5000
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - WALLET_URL=http://wallet-backend:8080/api/wallet
    labels:
      - "traefik.enable=true"
      # UI Router
      - "traefik.http.routers.shop-ui.rule=PathPrefix(`/shop`)"
      - "traefik.http.routers.shop-ui.entrypoints=web"
      - "traefik.http.middlewares.shop-ui-stripprefix.stripprefix.prefixes=/shop"
      - "traefik.http.routers.shop-ui.middlewares=shop-ui-stripprefix"
      
      # API Router (No stripping needed as backend expects /api/fashion)
      - "traefik.http.routers.shop-api.rule=PathPrefix(`/api/fashion`)"
      - "traefik.http.routers.shop-api.entrypoints=web"
      
      # Point both to the Node.js server port
      - "traefik.http.services.shop-ui.loadbalancer.server.port=5000"

  shop-carbon-flights-ui:
    container_name: shop-carbon-flights-ui
    build: ../services/shop_carbon_flights/frontend
    networks:
      - co2-network
    labels:
      - "traefik.enable=true"
      # 1. Define the route: Access this shop via /flights
      - "traefik.http.routers.shop-flights-ui.rule=PathPrefix(`/flights`)"
      - "traefik.http.routers.shop-flights-ui.entrypoints=web"

      # 2. Middleware: Strip the /flights prefix so Nginx serves files from its root (/)
      - "traefik.http.middlewares.shop-flights-strip.stripprefix.prefixes=/flights"

      # 3. Apply the middleware to the router
      - "traefik.http.routers.shop-flights-ui.middlewares=shop-flights-strip"

      # 4. Route to the internal Nginx port (80)
      - "traefik.http.services.shop-flights-ui.loadbalancer.server.port=80"

  shop-carbon-flights-backend:
    container_name: shop-carbon-flights-backend
    build: ../services/shop_carbon_flights/backend # Pfad anpassen
    networks:
      - co2-network
    depends_on:
      - rabbitmq
      - wallet-backend
    labels:
      - "traefik.enable=true"
      # API Route definieren
      - "traefik.http.routers.shop-flights-backend.rule=PathPrefix(`/api/flights`)"
      - "traefik.http.routers.shop-flights-backend.entrypoints=web"
      - "traefik.http.services.shop-flights-backend.loadbalancer.server.port=8080"

  # --- INFRASTRUKTUR ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - co2-network

networks:
  co2-network:
    driver: bridge