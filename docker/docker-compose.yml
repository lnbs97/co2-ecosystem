services:
  traefik:
    image: "traefik:v2.10"
    container_name: "traefik"
    command:
      - "--log.level=DEBUG"
      - "--api=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.dashboard.address=:8088"
    ports:
      - "8081:80"
      - "8088:8088"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - co2-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=dashboard"

  hub-backend:
    container_name: hub-backend
    build: ../services/hub/backend
    networks:
      - co2-network
    labels:
      - "traefik.enable=true"
      # WICHTIG: Prüfe, ob dieser Prefix auch in der App erwartet wird.
      # Falls die App keine Ahnung von "/api/user-service" hat, brauchst du hier auch einen StripPrefix!
      - "traefik.http.routers.hub-backend.rule=PathPrefix(`/api/user-service`)"
      - "traefik.http.routers.hub-backend.entrypoints=web"
      # WICHTIG: Prüfe, ob der Container intern WIRKLICH auf 8080 lauscht (siehe Checkliste unten)
      - "traefik.http.services.hub-backend.loadbalancer.server.port=8080"

  hub-ui:
    container_name: hub-ui
    build: ../services/hub/frontend
    networks:
      - co2-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hub-ui.rule=PathPrefix(`/`)"
      - "traefik.http.routers.hub-ui.entrypoints=web"
      - "traefik.http.services.hub-ui.loadbalancer.server.port=80"

  wallet-backend:
    container_name: wallet-backend
    build: ../services/wallet/backend
    networks:
      - co2-network
    depends_on:
      - rabbitmq
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wallet-backend.rule=PathPrefix(`/api/wallet`)"
      - "traefik.http.routers.wallet-backend.entrypoints=web"
      - "traefik.http.services.wallet-backend.loadbalancer.server.port=8080"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - co2-network

  wallet-ui:
    container_name: wallet-ui
    build: ../services/wallet/frontend
    networks:
      - co2-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wallet-ui.rule=PathPrefix(`/wallet`)"
      - "traefik.http.routers.wallet-ui.entrypoints=web"
      - "traefik.http.middlewares.wallet-redirect-slash.redirectregex.regex=^/(.*)wallet$$"
      - "traefik.http.middlewares.wallet-redirect-slash.redirectregex.replacement=/$${1}wallet/"
      - "traefik.http.middlewares.wallet-stripprefix.stripprefix.prefixes=/wallet"
      - "traefik.http.routers.wallet-ui.middlewares=wallet-redirect-slash,wallet-stripprefix"
      - "traefik.http.services.wallet-ui.loadbalancer.server.port=3000"

networks:
  co2-network:
    driver: bridge